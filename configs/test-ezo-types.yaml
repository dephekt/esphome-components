substitutions:
  device_mac: "atlas01"

esphome:
  name: atlas-hydro-monitor
  friendly_name: Atlas Hydro Monitor

esp32:
  board: featheresp32
  framework:
    type: arduino

ota:
  - platform: esphome
    password: !secret hydro_monitor_ota_key

api:
  encryption:
    key: !secret api_encryption_key

external_components:
  - source:
      type: local
      path: ..
    components: ["ezo_types"]

logger:
  level: DEBUG

captive_portal:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  passive_scan: false
  power_save_mode: none
  ap:
    ssid: "atlas-${device_mac}"
    password: !secret fallback_hotspot_key

web_server:
  version: 3
  port: 80

  sorting_groups:
    - id: ph_circuit
      name: "pH Circuit"
      sorting_weight: 10
    - id: ec_circuit
      name: "EC Circuit"
      sorting_weight: 20
    - id: rtd_circuit
      name: "RTD Circuit"
      sorting_weight: 30
    - id: orp_circuit
      name: "ORP Circuit"
      sorting_weight: 40

i2c:
  sda: 23
  scl: 22
  scan: true

text_sensor:

sensor:
  - platform: ezo_types
    type: ph
    id: ph_sensor
    name: "Water pH"
    address: 99
    update_interval: 5s
    accuracy_decimals: 3
    power_control_switch: ph_enable
    rtd_sensor: rtd_sensor
    temp_compensation_switch: ph_temp_comp_enable
    calibration_mode_switch: ph_cal_mode_enable
    web_server:
      sorting_group_id: ph_circuit
    voltage:
      name: "pH Voltage"
      web_server:
        sorting_group_id: ph_circuit
    reset_reason:
      name: "pH Reset Reason"
      web_server:
        sorting_group_id: ph_circuit
    firmware_version:
      name: "pH Firmware Version"
      web_server:
        sorting_group_id: ph_circuit
    calibration_status:
      name: "pH Calibration Status"
      web_server:
        sorting_group_id: ph_circuit
    temperature_compensation:
      name: "pH Temperature Compensation"
      web_server:
        sorting_group_id: ph_circuit
    on_slope:
      - logger.log:
          format: "[PH] Slope: %s mV/pH"
          args: ['x.c_str()']
    acid_slope_quality:
      name: "pH Acid Slope Quality"
      web_server:
        sorting_group_id: ph_circuit
    alkaline_slope_quality:
      name: "pH Alkaline Slope Quality"
      web_server:
        sorting_group_id: ph_circuit
    asymmetry_potential:
      name: "pH Asymmetry Potential"
      web_server:
        sorting_group_id: ph_circuit
    current_command:
      name: "pH Current Command"
      web_server:
        sorting_group_id: ph_circuit
    next_command:
      name: "pH Next Command"
      web_server:
        sorting_group_id: ph_circuit
    last_command:
      name: "pH Last Command"
      web_server:
        sorting_group_id: ph_circuit
    queue_size:
      name: "pH Queue Size"
      web_server:
        sorting_group_id: ph_circuit

  - platform: ezo_types
    type: ec
    id: ec_sensor
    name: "Water EC"
    address: 100
    update_interval: 5s
    power_control_switch: ec_enable
    rtd_sensor: rtd_sensor
    temp_compensation_switch: ec_temp_comp_enable
    calibration_mode_switch: ec_cal_mode_enable
    web_server:
      sorting_group_id: ec_circuit
    cell_constant:
      name: "EC Cell Constant"
      web_server:
        sorting_group_id: ec_circuit
    voltage:
      name: "EC Voltage"
      web_server:
        sorting_group_id: ec_circuit
    reset_reason:
      name: "EC Reset Reason"
      web_server:
        sorting_group_id: ec_circuit
    firmware_version:
      name: "EC Firmware Version"
      web_server:
        sorting_group_id: ec_circuit
    calibration_status:
      name: "EC Calibration Status"
      web_server:
        sorting_group_id: ec_circuit
    temperature_compensation:
      name: "EC Temperature Compensation"
      web_server:
        sorting_group_id: ec_circuit
    current_command:
      name: "EC Current Command"
      web_server:
        sorting_group_id: ec_circuit
    next_command:
      name: "EC Next Command"
      web_server:
        sorting_group_id: ec_circuit
    last_command:
      name: "EC Last Command"
      web_server:
        sorting_group_id: ec_circuit
    queue_size:
      name: "EC Queue Size"
      web_server:
        sorting_group_id: ec_circuit

  - platform: ezo_types
    type: rtd
    id: rtd_sensor
    name: "Water Temperature"
    address: 102
    update_interval: 5s
    power_control_switch: rtd_enable
    web_server:
      sorting_group_id: rtd_circuit
    voltage:
      name: "RTD Voltage"
      web_server:
        sorting_group_id: rtd_circuit
    reset_reason:
      name: "RTD Reset Reason"
      web_server:
        sorting_group_id: rtd_circuit
    firmware_version:
      name: "RTD Firmware Version"
      web_server:
        sorting_group_id: rtd_circuit
    calibration_status:
      name: "RTD Calibration Status"
      web_server:
        sorting_group_id: rtd_circuit
    current_command:
      name: "RTD Current Command"
      web_server:
        sorting_group_id: rtd_circuit
    next_command:
      name: "RTD Next Command"
      web_server:
        sorting_group_id: rtd_circuit
    last_command:
      name: "RTD Last Command"
      web_server:
        sorting_group_id: rtd_circuit
    queue_size:
      name: "RTD Queue Size"
      web_server:
        sorting_group_id: rtd_circuit

  - platform: ezo_types
    type: orp
    id: orp_sensor
    name: "Water ORP"
    address: 98
    update_interval: 5s
    power_control_switch: orp_enable
    web_server:
      sorting_group_id: orp_circuit
    voltage:
      name: "ORP Voltage"
      web_server:
        sorting_group_id: orp_circuit
    reset_reason:
      name: "ORP Reset Reason"
      web_server:
        sorting_group_id: orp_circuit
    firmware_version:
      name: "ORP Firmware Version"
      web_server:
        sorting_group_id: orp_circuit
    calibration_status:
      name: "ORP Calibration Status"
      web_server:
        sorting_group_id: orp_circuit
    current_command:
      name: "ORP Current Command"
      web_server:
        sorting_group_id: orp_circuit
    next_command:
      name: "ORP Next Command"
      web_server:
        sorting_group_id: orp_circuit
    last_command:
      name: "ORP Last Command"
      web_server:
        sorting_group_id: orp_circuit
    queue_size:
      name: "ORP Queue Size"
      web_server:
        sorting_group_id: orp_circuit

select:

button:
  # === Factory Reset ===
  - platform: template
    name: "pH Factory Reset"
    web_server:
      sorting_group_id: ph_circuit
    on_press:
      - lambda: 'id(ph_sensor).factory_reset();'

  - platform: template
    name: "EC Factory Reset"
    web_server:
      sorting_group_id: ec_circuit
    on_press:
      - lambda: 'id(ec_sensor).factory_reset();'

  - platform: template
    name: "RTD Factory Reset"
    web_server:
      sorting_group_id: rtd_circuit
    on_press:
      - lambda: 'id(rtd_sensor).factory_reset();'

  - platform: template
    name: "ORP Factory Reset"
    web_server:
      sorting_group_id: orp_circuit
    on_press:
      - lambda: 'id(orp_sensor).factory_reset();'

  # === pH Calibration ===
  - platform: template
    name: "pH Cal Mid (7.00)"
    web_server:
      sorting_group_id: ph_circuit
    on_press:
      - lambda: 'id(ph_sensor).set_calibration_point_mid(7.00);'

  - platform: template
    name: "pH Cal Low (4.00)"
    web_server:
      sorting_group_id: ph_circuit
    on_press:
      - lambda: 'id(ph_sensor).set_calibration_point_low(4.00);'

  - platform: template
    name: "pH Cal High (10.00)"
    web_server:
      sorting_group_id: ph_circuit
    on_press:
      - lambda: 'id(ph_sensor).set_calibration_point_high(10.00);'

  # === EC Calibration ===
  - platform: template
    name: "EC Dry Calibration"
    web_server:
      sorting_group_id: ec_circuit
    on_press:
      - lambda: 'id(ec_sensor).set_calibration_point_dry();'

  - platform: template
    name: "EC Cal Low (1413 µS/cm)"
    web_server:
      sorting_group_id: ec_circuit
    on_press:
      - lambda: 'id(ec_sensor).set_calibration_point_low(1413.0);'

  - platform: template
    name: "EC Cal High (5000 µS/cm)"
    web_server:
      sorting_group_id: ec_circuit
    on_press:
      - lambda: 'id(ec_sensor).set_calibration_point_high(5000.0);'

  # === RTD Calibration ===
  - platform: template
    name: "RTD Calibration (25.0°C)"
    web_server:
      sorting_group_id: rtd_circuit
    on_press:
      - lambda: 'id(rtd_sensor).set_calibration_generic(25.0);'

  # === ORP Calibration ===
  - platform: template
    name: "ORP Calibration (400 mV)"
    web_server:
      sorting_group_id: orp_circuit
    on_press:
      - lambda: 'id(orp_sensor).set_calibration_generic(400.0);'

  # === Clear Calibration ===
  - platform: template
    name: "pH Clear Calibration"
    web_server:
      sorting_group_id: ph_circuit
    on_press:
      - lambda: 'id(ph_sensor).clear_calibration();'

  - platform: template
    name: "EC Clear Calibration"
    web_server:
      sorting_group_id: ec_circuit
    on_press:
      - lambda: 'id(ec_sensor).clear_calibration();'

  - platform: template
    name: "RTD Clear Calibration"
    web_server:
      sorting_group_id: rtd_circuit
    on_press:
      - lambda: 'id(rtd_sensor).clear_calibration();'

  - platform: template
    name: "ORP Clear Calibration"
    web_server:
      sorting_group_id: orp_circuit
    on_press:
      - lambda: 'id(orp_sensor).clear_calibration();'

  # === System Control ===
  - platform: restart
    name: "Restart Device"

number:

switch:
  # === Circuit Power Control ===
  # Truth table for enable pins of sensor ports
  # +--------+--------+--------+----------------+
  # | Sensor | GPIO   | State  | Sensor Power   |
  # +--------+--------+--------+----------------+
  # | pH     | GPIO12 | LOW    | ON             |
  # | EC     | GPIO27 | LOW    | ON             |
  # | ORP    | GPIO33 | LOW    | ON             |
  # | RTD    | GPIO15 | HIGH   | ON             |
  # +--------+--------+--------+----------------+
  - platform: gpio
    pin:
      number: GPIO12
      inverted: true
    name: "Enable pH Circuit"
    id: ph_enable
    web_server:
      sorting_group_id: ph_circuit
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    pin:
      number: GPIO27
      inverted: true
    name: "Enable EC Circuit"
    id: ec_enable
    web_server:
      sorting_group_id: ec_circuit
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    pin:
      number: GPIO33
      inverted: true
    name: "Enable ORP Circuit"
    id: orp_enable
    web_server:
      sorting_group_id: orp_circuit
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    pin:
      number: GPIO15
      inverted: false
    name: "Enable RTD Circuit"
    id: rtd_enable
    web_server:
      sorting_group_id: rtd_circuit
    restore_mode: RESTORE_DEFAULT_ON

  # === Temperature Compensation Control ===
  - platform: template
    name: "pH Temperature Compensation"
    id: ph_temp_comp_enable
    optimistic: true
    web_server:
      sorting_group_id: ph_circuit
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "EC Temperature Compensation"
    id: ec_temp_comp_enable
    optimistic: true
    web_server:
      sorting_group_id: ec_circuit
    restore_mode: RESTORE_DEFAULT_OFF

  # === Calibration Mode Control ===
  - platform: template
    name: "pH Calibration Mode"
    id: ph_cal_mode_enable
    optimistic: true
    web_server:
      sorting_group_id: ph_circuit
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "EC Calibration Mode"
    id: ec_cal_mode_enable
    optimistic: true
    web_server:
      sorting_group_id: ec_circuit
    restore_mode: RESTORE_DEFAULT_OFF
