# Local ESPHome dev loop for the esphome-components monorepo.
#
# This repository owns reusable components only. Real grow controller firmware
# configs live in stackdrift/grow-fleet.
#
# Run from the repo root. The repo is mounted at /config, so scratch configs or
# component examples can pull the components in-tree via:
#     external_components:
#       - source: { type: local, path: /config }
#         components: [mlx90640, scd4x_alerts, scd4x_stats, ...]
#
# One-off CLI (ephemeral container, auto-removed):
#   docker compose -f docker/esphome-dev.yml run --rm esphome config  path/to/example.yaml
#   docker compose -f docker/esphome-dev.yml run --rm esphome compile path/to/scratch.yaml
#   docker compose -f docker/esphome-dev.yml run --rm esphome run     path/to/scratch.yaml --device /dev/ttyACM0
#
# Or the web dashboard (http://localhost:6052):
#   docker compose -f docker/esphome-dev.yml up -d
#
# USB notes: native USB devices can re-enumerate while flashing. `privileged:
# true` plus the host /dev bind lets the container follow those changes; a
# static `devices:` map would not. `network_mode: host` is for mDNS discovery,
# OTA, and network `logs`.
services:
  esphome:
    container_name: esphome-dev
    image: ghcr.io/esphome/esphome:2026.5
    volumes:
      - ../:/config
      - /etc/localtime:/etc/localtime:ro
      # Bind the whole host /dev so the container sees local serial ports and
      # follows native-USB re-enumeration during flashing.
      # (On this host, `privileged` alone did not expose /dev/ttyACM0.)
      - /dev:/dev
    privileged: true
    network_mode: host
    # No `restart:` policy on purpose: it also applies to `run --rm` containers,
    # which left exited one-off `run`s alive (each holding an ESPHome API
    # connection, hitting the API's 5-connection cap) instead of being removed.
    # For a persistent `up -d` dashboard, add `--restart unless-stopped` to that
    # container yourself rather than re-adding the policy here.
